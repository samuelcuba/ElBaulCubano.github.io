<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Baul Cubano - Tu Tienda Online</title>
    <!-- Tailwind CSS para diseño moderno sin complicaciones -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-hover:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Encabezado -->
    <header class="bg-red-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">🇨🇺 El Baul Cubano</h1>
            <div class="bg-white text-red-600 font-bold py-2 px-4 rounded-full text-sm">
                Carrito: <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-gradient-to-r from-red-500 to-yellow-500 text-white py-12 text-center">
        <h2 class="text-4xl font-extrabold mb-2">Todo lo que buscas, en un solo lugar</h2>
        <p class="text-lg">Pagos en efectivo (CUP) 🇨🇺 | Entrega a domicilio o punto de encuentro</p>
    </section>

    <!-- Productos -->
    <main class="container mx-auto px-4 py-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="productos-container">
        <!-- Los productos se cargan aquí automáticamente por JavaScript -->
    </main>

    <!-- Botón Flotante de WhatsApp -->
    <a href="#" id="whatsapp-btn" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 z-50 flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.493.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.929 4.664c-.004 3.626-2.962 6.584-6.59 6.584zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.629.775-.114.133-.232.148-.43.05-.197-.099-.836-.308-1.592-.985-.59-.523-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.132.065-.246.033-.346-.033-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.837.328 1.122.421.473.151.904.129 1.246.08.38-.058 1.171-.479 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <script>
        // AQUÍ ESTÁ TU INVENTARIO (Precio de costo y precio de venta)
        // El cliente NUNCA ve el "costo", solo tú.
        const inventario = [
            { id: 1, nombre: "Jabón de Bañar", costo: 150, venta: 250, img: "https://images.unsplash.com/photo-1607006344380-b6775a0824a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" },
            { id: 2, nombre: "Detergente 1kg", costo: 300, venta: 450, img: "https://images.unsplash.com/photo-1583947215250-56c71c9e26ca?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" },
            { id: 3, nombre: "Pollo Entero", costo: 400, venta: 550, img: "https://images.unsplash.com/photo-1587593810167-a84920ea0781?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" },
            { id: 4, nombre: "Cerveza Nacional", costo: 120, venta: 200, img: "https://images.unsplash.com/photo-1608270586620-248524c67de9?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" }
        ];

        let carrito = [];

        // Renderizar productos
        const container = document.getElementById('productos-container');
        inventario.forEach(producto => {
            container.innerHTML += `
                <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover">
                    <img src="${producto.img}" alt="${producto.nombre}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">${producto.nombre}</h3>
                        <p class="text-2xl font-extrabold text-red-600 my-2">${producto.venta} CUP</p>
                        <button onclick="agregarCarrito(${producto.id})" class="w-full bg-red-600 text-white font-bold py-2 rounded-lg hover:bg-red-700 transition">
                            Agregar al Carrito
                        </button>
                    </div>
                </div>
            `;
        });

        function agregarCarrito(id) {
            const producto = inventario.find(p => p.id === id);
            carrito.push(producto);
            document.getElementById('cart-count').innerText = carrito.length;
            actualizarWhatsApp();
            alert(`${producto.nombre} agregado al carrito!`);
        }

        function actualizarWhatsApp() {
            // CAMBIA EL NÚMERO POR TU NÚMERO DE WHATSAPP (incluye el 53 de Cuba)
            let telefono = "5312345678"; 
            let mensaje = "¡Hola! Quiero hacer el siguiente pedido en El Baul Cubano:%0A%0A";
            let total = 0;
            
            carrito.forEach((item, index) => {
                mensaje += `${index + 1}. ${item.nombre} - ${item.venta} CUP%0A`;
                total += item.venta;
            });
            
            mensaje += `%0A*Total a pagar en efectivo:* ${total} CUP%0A%0A¿Coordinamos la entrega?`;
            
            document.getElementById('whatsapp-btn').href = `https://wa.me/${telefono}?text=${mensaje}`;
        }
    </script>
</body>
</html>
